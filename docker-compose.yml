version: "3.9"

services:
  web:
    image: nginx:alpine
    container_name: proyecto-web
    ports:
      - "8080:80"
    volumes:
      - ./src:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - red-interna
    depends_on:
      - api

  api:
    image: clue/json-server
    container_name: proyecto-api
    volumes:
      - ./db.json:/data/db.json:ro
    networks:
      - red-interna

networks:
  red-interna:
    driver: bridge
